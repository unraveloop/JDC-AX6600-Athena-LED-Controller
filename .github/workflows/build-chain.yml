name: Build Chain (Rust Binary + IPK + APK)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 🟢 第一阶段：编译 Rust 核心二进制
  build_rust:
    name: 1. Build Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 读取版本号 (🌟 拆包后仓库里有两个 Makefile，固定从 athena-led/Makefile 读，
      #    避免 find 顺序不确定；两个包的 PKG_VERSION 必须保持一致)
      - name: Get Version
        id: version
        run: |
          MAKEFILE_PATH="athena-led/Makefile"

          if [ ! -f "$MAKEFILE_PATH" ]; then
            echo "⚠️ $MAKEFILE_PATH not found, using default version 1.0.0"
            PKG_VERSION="1.0.0"
          else
            PKG_VERSION=$(grep "PKG_VERSION:=" "$MAKEFILE_PATH" | cut -d"=" -f2 | tr -d '[:space:]')
            echo "✅ Found version $PKG_VERSION in $MAKEFILE_PATH"
          fi

          echo "VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT

      # 2. 准备 Rust 环境
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # 3. 安装 Zig (解决 ring 编译报错)
      - name: Install Zig & Zigbuild
        run: |
          pip3 install cargo-zigbuild ziglang

      # 4. 编译 Rust
      - name: Compile Rust
        working-directory: ./athena-led
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      # 5. 打包二进制 (这里是关键！强制使用长文件名)
      - name: Package Binary
        id: package
        working-directory: ./athena-led
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # ⚠️ 强制指定为 Makefile 要求的长文件名格式 (带架构名)
          FILENAME="athena-led-aarch64-unknown-linux-musl-v${VERSION}.tar.gz"
          
          mkdir -p dist
          cp target/aarch64-unknown-linux-musl/release/athena-led dist/

          cd dist
          tar -czvf ../$FILENAME athena-led
          cd ..

          # 🌟 [v2.3.1] 生成校验和，供用户验证下载完整性
          sha256sum $FILENAME > $FILENAME.sha256
          cat $FILENAME.sha256

          echo "ASSET_NAME=$FILENAME" >> $GITHUB_OUTPUT
          echo "✅ Packed binary: $FILENAME"

      # 6. 上传 Rust 二进制 + 校验和
      - name: Upload Rust Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            athena-led/*.tar.gz
            athena-led/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. 传递给 OpenWrt 任务
      - name: Pass Artifact to Next Job
        uses: actions/upload-artifact@v4
        with:
          name: rust-binary-tarball
          path: athena-led/*.tar.gz
          retention-days: 1

  # 🔵 第二阶段：编译 OpenWrt 安装包
  build_openwrt:
    name: 2. Build ${{ matrix.type }}
    needs: build_rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: ipk
            name: Stable (23.05)
            sdk_url: "https://downloads.openwrt.org/releases/23.05.5/targets/ipq807x/generic"
            use_apk: false
          - type: apk
            name: Snapshot (Qualcommax)
            sdk_url: "https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx"
            use_apk: true

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust Artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-binary-tarball
          path: local_dl/

      - name: Prepare SDK
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          
          BASE_URL="${{ matrix.sdk_url }}"
          SDK_FILE=$(wget -qO- "$BASE_URL/sha256sums" | grep "sdk" | grep "Linux-x86_64" | head -n 1 | awk '{print $2}' | sed 's/*//g')
          wget -q "$BASE_URL/$SDK_FILE"
          
          if [[ "$SDK_FILE" == *.zst ]]; then 
            zstd -d "$SDK_FILE" -o sdk.tar
            tar -xf sdk.tar
          else 
            tar -xf "$SDK_FILE"
          fi
          
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          mv "$EXTRACTED_DIR" sdk

      - name: Inject Source into SDK
        run: |
          mkdir -p sdk/dl
          cp local_dl/*.tar.gz sdk/dl/

      - name: Configure Feeds
        working-directory: ./sdk
        run: |
          sed -i 's|git.openwrt.org/openwrt/openwrt.git|github.com/openwrt/openwrt.git|g' feeds.conf.default
          sed -i 's|git.openwrt.org/feed/packages.git|github.com/openwrt/packages.git|g' feeds.conf.default
          sed -i 's|git.openwrt.org/project/luci.git|github.com/openwrt/luci.git|g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Packages
        working-directory: ./sdk
        run: |
          sudo apt-get install -y dos2unix

          # 🌟 [包拆分] v2.3.0 起编两个包:
          #   athena-led          — 核心守护进程 (预编译二进制 + init + config + 动画)
          #   luci-app-athena-led — 纯 Web 界面 (JS 架构, PKGARCH=all)
          # 1. athena-led 核心包 (只拷 Makefile + files，不拷 Rust 源码/target)
          mkdir -p package/athena-led
          cp "$GITHUB_WORKSPACE/athena-led/Makefile" package/athena-led/
          cp -r "$GITHUB_WORKSPACE/athena-led/files" package/athena-led/

          # 2. luci-app 界面包 (物理复制代替软链接)
          mkdir -p package/luci-app-athena-led
          cp -r "$GITHUB_WORKSPACE/luci-app-athena-led"/* package/luci-app-athena-led/

          # 3. 🚨 强制转为 Linux 换行符 (专治 Windows 换行符崩溃)；
          #    排除二进制动画文件，防止 .bin 被 dos2unix 毁掉
          find package/athena-led package/luci-app-athena-led -type f ! -name "*.bin" -exec dos2unix {} +

          # 4. 🚨 移除会导致找不到密钥而崩溃的 CONFIG_SIGNED_PACKAGES
          echo "CONFIG_PACKAGE_athena-led=m" > .config
          echo "CONFIG_PACKAGE_luci-app-athena-led=m" >> .config

          make defconfig
          make package/athena-led/download V=s
          make package/athena-led/compile V=s -j$(nproc)
          make package/luci-app-athena-led/compile V=s -j$(nproc)

      # 🌟 [v2.3.1] 生成安装包校验和 (按 ipk/apk 分文件，避免两个矩阵任务互相覆盖)
      - name: Generate checksums
        run: |
          cd sdk/bin
          find . -name "*athena-led*.${{ matrix.type }}" | while read f; do
            sha256sum "$f"
          done | sed 's# \./.*/# #' > sha256sums-${{ matrix.type }}.txt
          cat sha256sums-${{ matrix.type }}.txt

      - name: Upload Packages to Release
        uses: softprops/action-gh-release@v1
        with:
          # 通配 athena-led*.ipk 同时覆盖 athena-led 与 luci-app-athena-led 两个包
          files: |
            sdk/bin/**/*athena-led*.${{ matrix.type }}
            sdk/bin/sha256sums-${{ matrix.type }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
